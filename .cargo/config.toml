[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-no-asm"]

[target.aarch64-unknown-uefi]
rustflags = [
  "-Ctarget-feature=+strict-align,-neon,-fp-armv8,+v8.1a",
  "-Clink-arg=/NOLOGO",
  "-Clink-arg=/map:barekit.map",
  "-Clink-arg=/entry:entry",
  "-Clink-arg=/subsystem:efi_application",
  "-Clink-arg=/machine:arm64",
  "-Clink-arg=/filealign:4096",
  "-Clink-arg=/base:0",
]
